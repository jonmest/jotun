# cargo-mutants config. run with `cargo mutants` or `just mutants`.
#
# Mutation testing flips operators and constants in your source and verifies
# the test suite catches the change. An untested mutant ("MISSED") means
# the tests don't distinguish that piece of behavior.

# Use nextest since our suite depends on it locally.
test_tool = "nextest"

exclude_globs = [
    "**/target/**",
    "jotun-core/src/transport/protobuf/**",
    # Telemetry is observability, not behavior — we don't assert on its output.
    "jotun-core/src/engine/telemetry.rs",
]

# Skip:
#  - handlers that are still todo!() (can't meaningfully mutate a panic),
#  - Display impls (purely diagnostic; no tests assert on them),
#  - accessor/builder helpers (getters and constructors are trivial by design).
exclude_re = [
    "^on_tick$",
    "^on_client_proposal$",
    "^on_vote_response$",
    "^become_leader$",
    "fmt::Display",
    "fmt::Debug",
]
