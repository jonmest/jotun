# cargo-deny configuration. Install: cargo install cargo-deny
# Run: cargo deny check

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
unused-allowed-license = "allow"

# Our own crate is BSL-1.1, which is not an SPDX identifier. Tell cargo-deny
# not to complain about workspace crates with a non-standard license.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
