# Use mold as the linker on Linux. Requires `mold` and
# `clang` installed; on Debian/Ubuntu: `apt install mold clang`.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[alias]
c = "check --all-targets"
t = "nextest run --lib"
d = "doc --no-deps --open"
